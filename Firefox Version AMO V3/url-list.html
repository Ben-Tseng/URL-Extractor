<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>URL List</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
        background: #ffffff;
        color: #111111;
      }

      .wrap {
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 600;
      }

      .meta {
        font-size: 12px;
        color: #6b6b6b;
        margin-bottom: 10px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      button {
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        background: #ffffff;
        color: #111111;
        padding: 7px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      button.primary {
        border-color: #111111;
        background: #111111;
        color: #ffffff;
      }

      #list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        margin-bottom: 8px;
      }

      a {
        display: block;
        text-decoration: none;
        color: #111111;
        background: #ffffff;
        border: 1px solid #e3e3e3;
        border-radius: 12px;
        padding: 10px;
        word-break: break-all;
      }

      a:hover {
        border-color: #111111;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Multiple URLs</h1>
      <div id="meta" class="meta"></div>
      <div class="actions">
        <button id="openAllBtn" type="button" class="primary">Open All</button>
        <button id="closeBtn" type="button">Close</button>
      </div>
      <ul id="list"></ul>
    </div>

    <script src="url-list.js"></script>
  </body>
</html>
